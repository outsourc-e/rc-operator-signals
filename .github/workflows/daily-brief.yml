name: Daily brief prerender

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  prerender:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile=false

      - run: pnpm --filter dashboard prerender
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Commit updated dashboard data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/dashboard/src/data/dashboard.json apps/dashboard/src/data/brief.json apps/dashboard/src/data/brief-today.md
          git diff --cached --quiet && exit 0
          git commit -m "chore: refresh daily operator brief"
          git push
